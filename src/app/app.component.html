<div class="d-flex flex-column min-vh-100">
  <header class="glass-header-wrapper">
    <div class="container-fluid">
      <div class="header-inner">
        <div class="header-left">
          <a class="brand-link" href="#">
            <img
              src="assets/images/logo.png"
              alt="Main Logo"
              class="logo-main"
            />
          </a>
        </div>

        <div class="header-right">
          <div class="logo-group">
            <img
              src="assets/images/logo_sb.png"
              alt="Secondary Logo 1"
              class="logo-side"
            />
            <div class="vertical-divider"></div>
            <img
              src="assets/images/logo_di.png"
              alt="Secondary Logo 2"
              class="logo-side"
            />
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow-1">
    <router-outlet></router-outlet>
  </main>

  <footer class="glass-footer-premium">
    <div class="footer-glass-content">
      Designed & Developed by
      <span class="nic-brand">National Informatics Centre (NIC)</span>
    </div>
  </footer>
</div>

<div class="toast-viewport">
  @if (toast$ | async; as toast) {
    <div
      class="acrylic-toast"
      [className]="
        'acrylic-toast ' + toast.type + (isClosing ? ' closing' : '')
      "
      role="alert"
    >
      <div class="acrylic-inner">
        <div class="icon-ring-container">
          <svg class="timer-svg" viewBox="0 0 36 36">
            <path
              class="timer-path"
              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
            />
          </svg>
          <i
            class="mdi"
            [ngClass]="{
              'mdi-check-bold': toast.type === 'success',
              'mdi-alert-variant': toast.type === 'warning',
              'mdi-close-thick': toast.type === 'error',
            }"
          ></i>
        </div>

        <div class="toast-content">
          <span class="toast-msg">{{ toast.message }}</span>
        </div>

        <button class="toast-dismiss" (click)="closeToast()">
          <i class="mdi mdi-close"></i>
        </button>
      </div>
    </div>
  }
</div>
