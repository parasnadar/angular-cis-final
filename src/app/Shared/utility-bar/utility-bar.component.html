<div class="glass-utility-dock">
  <div class="dock-inner-flex">
    <nav class="dock-nav-track">
      <div
        *ngFor="let item of menuOptions; let idx = index"
        class="dock-nav-item-group"
      >
        <button
          type="button"
          class="dock-nav-pill"
          [class.is-active]="currentSelectedParent === item"
          [class.dropdown-active]="activeDropdownIndex === idx"
          (click)="handleParentClick(item, idx, $event)"
        >
          <span class="pill-title-flex">
            <i *ngIf="item.icon" [class]="item.icon + ' core-pill-icon'"></i>
            <span class="pill-label-text">{{ item.label }}</span>
          </span>
          <i
            *ngIf="item.children && item.children.length > 0"
            class="pi pi-chevron-down dynamic-arrow-icon"
          ></i>
        </button>

        <div
          *ngIf="item.children && item.children.length > 0"
          class="dock-flyout-panel desktop-only-panel"
          [class.is-expanded]="activeDropdownIndex === idx"
        >
          <div class="flyout-inner-container">
            <button
              *ngFor="let child of item.children"
              type="button"
              class="flyout-action-node"
              [class.is-node-selected]="currentSelectedItem === child"
              (click)="handleChildClick(item, child, $event)"
            >
              <span class="node-title-flex">
                <i *ngIf="child.icon" [class]="child.icon + ' node-icon'"></i>
                <span class="node-label-text">{{ child.label }}</span>
              </span>
              <i
                *ngIf="currentSelectedItem === child"
                class="pi pi-check selection-check-ico"
              ></i>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="dock-utilities-dock">
      <ng-content select="[actions]"></ng-content>

      <div class="dock-profile-segment">
        <button
          type="button"
          class="dock-profile-trigger"
          [class.is-active-panel]="isProfileMenuOpen"
          (click)="toggleProfileMenu($event)"
        >
          <div class="dock-avatar-frame">
            <span>MP</span>
          </div>
          <div class="dock-profile-meta">
            <span class="meta-user-name">MEMBERPB1</span>
            <span class="meta-user-role">Principal Bench</span>
          </div>
          <i class="pi pi-chevron-down trigger-arrow"></i>
        </button>

        <div
          class="dock-profile-dropdown"
          [class.is-visible]="isProfileMenuOpen"
        >
          <div class="dropdown-actions-list">
            <button
              type="button"
              class="dropdown-action-row"
              (click)="handleAccountAction('change_password')"
            >
              <div class="row-icon-box shield-variant">
                <i class="pi pi-shield"></i>
              </div>
              <span class="row-label">Change Password</span>
            </button>

            <button
              type="button"
              class="dropdown-action-row logout-variant"
              (click)="handleAccountAction('logout')"
            >
              <div class="row-icon-box power-variant">
                <i class="pi pi-power-off"></i>
              </div>
              <span class="row-label">Sign Out</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ng-container *ngFor="let item of menuOptions; let idx = index">
    <div
      *ngIf="
        item.children && item.children.length > 0 && activeDropdownIndex === idx
      "
      class="mobile-upfront-submenu-panel"
    >
      <button
        *ngFor="let child of item.children"
        type="button"
        class="flyout-action-node"
        [class.is-node-selected]="currentSelectedItem === child"
        (click)="handleChildClick(item, child, $event)"
      >
        <span class="node-title-flex">
          <i *ngIf="child.icon" [class]="child.icon + ' node-icon'"></i>
          <span class="node-label-text">{{ child.label }}</span>
        </span>
        <i
          *ngIf="currentSelectedItem === child"
          class="pi pi-check selection-check-ico"
        ></i>
      </button>
    </div>
  </ng-container>
</div>
